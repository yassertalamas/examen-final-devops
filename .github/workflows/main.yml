name: CI/CD Pipeline - Examen Final

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias y Lint
        run: |
          cd app
          npm install
          #npm

      - name: Build de Imagen Docker
        run: |
          docker build -t mi-hola-mundo:${{ github.sha }} ./app

      - name: Validar Manifiestos K8s
        run: |
          # verificación yaml
          docker run --rm -v $(pwd)/k8s:/apps alpine/kube-score:latest score /apps/*.yaml || true
